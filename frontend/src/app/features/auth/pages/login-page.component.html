<section class="login-wrapper">
  <h1>GKDEV</h1>

  <button type="button" class="google-login" (click)="onGoogleLogin()">
    <span class="google-icon" aria-hidden="true">G</span>
    Entrar com Google
  </button>

  <div class="divider"><span>ou</span></div>

  <form [formGroup]="form" (ngSubmit)="onSubmitLogin()" class="login-form">
    <label>
      Usuário
      <input type="text" formControlName="username" placeholder="Digite seu usuário" />
    </label>

    <label>
      Senha
      <input type="password" formControlName="password" placeholder="Digite sua senha" />
    </label>

    <div class="actions">
      <button type="submit" [disabled]="loading">{{ loading ? 'Autenticando...' : 'Entrar' }}</button>
    </div>
  </form>

  <p class="feedback success" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <section class="session-status" *ngIf="isAuthenticated()">
    <h2>Sessão em memória ativa</h2>
    <p>
      Usuário autenticado: <strong>{{ currentUser()?.username || 'não informado' }}</strong>
      (perfis: {{ currentUser()?.roles?.join(', ') || 'não informado' }}).
    </p>
    <p>O token não é salvo em localStorage/sessionStorage.</p>
    <button type="button" class="secondary" (click)="onLogout()">Encerrar sessão</button>
  </section>
</section>
