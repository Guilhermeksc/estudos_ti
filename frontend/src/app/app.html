<div class="layout">
  <header class="topbar">
    <div class="brand">GKDev</div>
    <nav class="menu">
      <a *ngIf="!isAuthenticated()" routerLink="/login" routerLinkActive="active">Login</a>
      <a *ngIf="isAuthenticated()" routerLink="/areas" routerLinkActive="active">Áreas de Conhecimento</a>
      <span *ngIf="isAuthenticated()" class="user-name">
        {{ currentUser()?.name || currentUser()?.username || currentUser()?.email || 'Usuário' }}
      </span>
      <button *ngIf="isAuthenticated()" type="button" class="logout-button" (click)="logout()">
        Sair
      </button>
    </nav>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
