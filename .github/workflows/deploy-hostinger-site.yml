name: Deploy Frontend to Hostinger Sites

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "scripts/prepare-hostinger-site.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hostinger-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend deploy bundle
        run: npm run build

      - name: FTP Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./dist/
          server-dir: /public_html/
