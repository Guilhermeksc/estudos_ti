name: Deploy Frontend to Hostinger Sites

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hostinger-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular frontend
        run: npm run build:frontend

      - name: Ensure SPA .htaccess exists
        run: |
          DEPLOY_DIR="frontend/dist/browser/"
          if [ ! -f "${DEPLOY_DIR}.htaccess" ]; then
            cat > "${DEPLOY_DIR}.htaccess" <<'HTACCESS'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTACCESS
          fi

      - name: Validate build output
        run: |
          test -f frontend/dist/browser/index.html

      - name: FTP Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          local-dir: frontend/dist/browser/
          server-dir: /public_html/
