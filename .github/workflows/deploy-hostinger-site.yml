name: Deploy Frontend to Hostinger Sites

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hostinger-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular frontend
        run: npm run build:frontend

      - name: Resolve deploy directory
        id: deploy_dir
        run: |
          if [ -d "frontend/dist/frontend/browser" ]; then
            echo "path=frontend/dist/frontend/browser/" >> "$GITHUB_OUTPUT"
          else
            echo "path=frontend/dist/frontend/" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure SPA .htaccess exists
        run: |
          DEPLOY_DIR="${{ steps.deploy_dir.outputs.path }}"
          if [ ! -f "${DEPLOY_DIR}.htaccess" ]; then
            cat > "${DEPLOY_DIR}.htaccess" <<'HTACCESS'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTACCESS
          fi

      - name: FTP Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          local-dir: ${{ steps.deploy_dir.outputs.path }}
          server-dir: /public_html/
